<main>
  <div class="flex flex-col gap-5 m-5">
    @if (vehicles(); as options) {
      <app-filters
        [selected]="selectedVehicle()"
        [options]="options"
        (selectedChange)="handleSelectedChange($event)"
      />
    }
    @if (fuelData(); as data) {
      <app-fuel-consumption [data]="data" />
    }
    <mat-card appearance="outlined">
      @if (telemetry(); as telemetry) {
        <app-telemetry-list [data]="telemetry" [selected]="locations() ?? []" />
      }
    </mat-card>
  </div>
</main>
